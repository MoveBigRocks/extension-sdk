name: Validate SDK Template

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK sources
        uses: actions/checkout@v4

      - name: Checkout platform sources for CLI validation
        uses: actions/checkout@v4
        with:
          repository: MoveBigRocks/platform
          ref: main
          path: platform

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache-dependency-path: platform/go.sum

      - name: Build mbr CLI
        working-directory: platform
        run: go build -o "${RUNNER_TEMP}/mbr" ./cmd/mbr

      - name: Validate template manifest and contract
        run: |
          "${RUNNER_TEMP}/mbr" extensions lint . --json
          "${RUNNER_TEMP}/mbr" extensions lint . --write-contract --json
          git diff --exit-code -- extension.contract.json

      - name: Build sample bundle
        run: |
          go run ./scripts/build-bundle.go --source . --out "${RUNNER_TEMP}/sample-extension.bundle.json"
          test -s "${RUNNER_TEMP}/sample-extension.bundle.json"

      - name: Smoke test signing tools
        run: |
          go run ./scripts/generate-signing-key.go \
            --publisher "Move Big Rocks CI" \
            --key-id ci-test \
            --seed-out "${RUNNER_TEMP}/extension-sdk.seed.b64" \
            --trusted-publishers-out "${RUNNER_TEMP}/extension-sdk.publisher.json"
          export MBR_EXTENSION_SIGNING_PRIVATE_KEY_B64="$(cat "${RUNNER_TEMP}/extension-sdk.seed.b64")"
          go run ./scripts/sign-bundle.go \
            --bundle "${RUNNER_TEMP}/sample-extension.bundle.json" \
            --out "${RUNNER_TEMP}/sample-extension.signed.bundle.json" \
            --key-id ci-test \
            --private-key-env MBR_EXTENSION_SIGNING_PRIVATE_KEY_B64 \
            --publisher-key-out "${RUNNER_TEMP}/extension-sdk.publisher-key.json"
          test -s "${RUNNER_TEMP}/sample-extension.signed.bundle.json"
          test -s "${RUNNER_TEMP}/extension-sdk.publisher.json"
          test -s "${RUNNER_TEMP}/extension-sdk.publisher-key.json"
